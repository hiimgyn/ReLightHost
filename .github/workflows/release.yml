name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check signing secrets
        run: |
          if ($env:TAURI_SIGNING_PRIVATE_KEY -eq $null -or $env:TAURI_SIGNING_PRIVATE_KEY -eq "") {
            Write-Error "TAURI_SIGNING_PRIVATE_KEY is NOT set!"; exit 1
          }
          Write-Host "TAURI_SIGNING_PRIVATE_KEY length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length)"
          if ($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD -eq $null -or $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD -eq "") {
            Write-Warning "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is empty (ok only if key was generated without password)"
          } else {
            Write-Host "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is set (length: $($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD.Length))"
          }
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build and release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # CPAL_ASIO_DIR: ${{ secrets.ASIO_SDK_PATH }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ReLightHost ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true

      - name: Verify signature files
        run: |
          $sigs = Get-ChildItem -Recurse src-tauri/target/release/bundle -Filter "*.sig" -ErrorAction SilentlyContinue
          if ($sigs.Count -eq 0) {
            Write-Error "No .sig files found! Signing failed — check TAURI_SIGNING_PRIVATE_KEY_PASSWORD."
            exit 1
          }
          Write-Host "Found $($sigs.Count) signature file(s):"
          $sigs | ForEach-Object { Write-Host "  $($_.FullName)" }
